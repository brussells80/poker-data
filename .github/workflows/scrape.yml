name: Scrape Poker Games

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install libraries
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scrapers
        run: |
          python npl_scraper.py
          python kings_scraper.py

      - name: Commit updated JSON
        run: |
          git config --global user.name "poker-bot"
          git config --global user.email "bot@github.com"
          git add *.json
          git commit -m "update poker data" || echo "no changes"
          git push
