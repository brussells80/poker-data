name: Scrape Poker Games

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium and chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-driver

      - name: Run APL scraper
        run: python apl_scraper.py
        continue-on-error: true

      - name: Run NPL scraper
        run: python npl_scraper.py
        continue-on-error: true

      - name: Run Kings scraper
        run: python kings_scraper.py
        continue-on-error: true

      - name: Run Kings Live scraper
        run: python kings_live_scraper.py
        continue-on-error: true

      - name: Run Star scraper
        run: python star_scraper.py
        continue-on-error: true

      - name: Run PokerMania scraper
        run: python pokermania_scraper.py
        continue-on-error: true

      - name: Commit and push outputs
        if: always()
        run: |
          git config --global user.name "poker-bot"
          git config --global user.email "actions@github.com"
          git add *.json *.html *.txt *.png || true
          git commit -m "update poker data" || echo "No changes to commit"
          git push
